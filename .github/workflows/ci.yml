name: expense-ui CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: mengty199/expense-ui

jobs:
  # ── Lint & Type Check ──────────────────────────────────────
  quality:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck

  # ── Build & Push ───────────────────────────────────────────
  build-push:
    name: Build & Push Image
    needs: quality
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=ref,event=branch

      - name: Scan Dockerfile for misconfigs
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: '1'

      # NEXT_PUBLIC_API_URL is baked into the bundle at build time
      - name: Determine API URL for environment
        id: api-url
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "url=https://staging-expense-api.limmengty.com" >> $GITHUB_OUTPUT
          else
            echo "url=https://dev-expense-api.limmengty.com" >> $GITHUB_OUTPUT
          fi

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ steps.api-url.outputs.url }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
          severity: CRITICAL
          exit-code: '0'

  # ── Update CD Repo ─────────────────────────────────────────
  update-cd:
    name: Update CD Manifest
    needs: build-push
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout CD repo
        uses: actions/checkout@v4
        with:
          repository: limmengty/k8s-expense-demo
          token: ${{ secrets.CD_REPO_TOKEN }}
          path: cd-repo

      - name: Install kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Determine target overlay
        id: env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "overlay=staging" >> $GITHUB_OUTPUT
          else
            echo "overlay=dev" >> $GITHUB_OUTPUT
          fi

      - name: Patch image tag in overlay
        run: |
          kustomize edit set image mengty199/expense-ui=mengty199/expense-ui:${{ needs.build-push.outputs.image-tag }}
        working-directory: cd-repo/apps/expense-ui/overlays/${{ steps.env.outputs.overlay }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/expense-ui/overlays/${{ steps.env.outputs.overlay }}/kustomization.yaml
          git commit -m "ci(expense-ui): update image → ${{ needs.build-push.outputs.image-tag }} [${{ steps.env.outputs.overlay }}]"
          git push
        working-directory: cd-repo
